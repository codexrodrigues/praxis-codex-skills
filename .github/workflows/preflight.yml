name: Preflight

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-fallbacks:
    name: Python fallback preflight
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python fallback preflight
        run: python3 scripts/preflight-python-fallbacks.py
